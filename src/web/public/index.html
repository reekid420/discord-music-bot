<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Groove Music Bot — Web Dashboard">
  <title>Groove — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card glass">
      <div class="login-logo">
        <span class="logo-icon">🎵</span>
        <h1>Groove</h1>
        <p class="login-subtitle">Music Bot Dashboard</p>
      </div>
      <form id="login-form">
        <div class="input-group">
          <input type="password" id="login-password" placeholder="Dashboard Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard" hidden>
    <!-- Sidebar / Top Nav -->
    <header class="topbar glass">
      <div class="topbar-left">
        <span class="logo-icon-sm">🎵</span>
        <span class="topbar-title">Groove</span>
      </div>
      <nav class="topbar-nav">
        <button class="nav-btn active" data-view="nowplaying">
          <span class="nav-icon">🎶</span> Now Playing
        </button>
        <button class="nav-btn" data-view="queue">
          <span class="nav-icon">📋</span> Queue
        </button>
        <button class="nav-btn" data-view="playlists">
          <span class="nav-icon">💿</span> Playlists
        </button>
        <button class="nav-btn" data-view="upload">
          <span class="nav-icon">📁</span> Upload
        </button>
        <button class="nav-btn" data-view="settings">
          <span class="nav-icon">⚙️</span> Settings
        </button>
      </nav>
      <div class="topbar-right">
        <select id="guild-selector" class="guild-select">
          <option value="">Loading guilds...</option>
        </select>
        <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Now Playing View -->
      <section id="view-nowplaying" class="view active">
        <!-- Search / Add to Queue -->
        <div class="search-bar glass">
          <span class="search-icon">🔍</span>
          <input
            id="search-input"
            type="text"
            placeholder="Search YouTube, SoundCloud, Spotify or paste a URL — playlists supported…"
            autocomplete="off"
          >
          <button id="search-btn" class="btn btn-primary btn-sm">▶ Play</button>
        </div>

        <div class="player-card glass">
          <div class="player-artwork">
            <img id="np-thumbnail" src="" alt="" class="artwork-img">
            <div class="artwork-placeholder" id="np-placeholder">🎵</div>
          </div>
          <div class="player-info">
            <h2 id="np-title" class="player-title">Nothing Playing</h2>
            <p id="np-artist" class="player-artist">—</p>
            <p id="np-requested" class="player-requested"></p>
          </div>
          <div class="player-progress">
            <div id="np-scrubber" class="progress-scrubber" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
              <div class="progress-scrubber-track">
                <div id="np-progress-bar" class="progress-bar-fill"></div>
              </div>
              <div id="np-scrubber-thumb" class="progress-scrubber-thumb"></div>
            </div>
            <div class="progress-labels">
              <span id="np-current-time">0:00</span>
              <span id="np-total-time">0:00</span>
            </div>
          </div>
          <div class="player-controls">
            <button id="ctrl-stop" class="ctrl-btn" title="Stop">⏹</button>
            <button id="ctrl-rewind" class="ctrl-btn" title="Rewind 10s">⏪</button>
            <button id="ctrl-playpause" class="ctrl-btn ctrl-main" title="Play/Pause">▶</button>
            <button id="ctrl-forward" class="ctrl-btn" title="Fast-forward 10s">⏩</button>
            <button id="ctrl-skip" class="ctrl-btn" title="Skip">⏭</button>
          </div>
          <div class="player-controls-row2">
            <button id="ctrl-loop" class="ctrl-btn ctrl-btn-sm" title="Loop" data-mode="0">➡️</button>
          </div>
          <div class="player-volume">
            <span class="volume-icon">🔊</span>
            <input id="ctrl-volume" type="range" min="1" max="100" value="80" class="volume-slider">
            <span id="volume-label" class="volume-label">80%</span>
          </div>
        </div>
      </section>

      <!-- Queue View -->
      <section id="view-queue" class="view">
        <div class="view-header">
          <h2>Queue</h2>
          <div class="view-actions">
            <button id="queue-shuffle" class="btn btn-secondary btn-sm">🔀 Shuffle</button>
          </div>
        </div>
        <div id="queue-list" class="queue-list">
          <p class="empty-state">Queue is empty</p>
        </div>
      </section>

      <!-- Playlists View -->
      <section id="view-playlists" class="view">
        <div class="view-header">
          <h2>Playlists</h2>
          <button id="playlist-create-btn" class="btn btn-primary btn-sm">+ New Playlist</button>
        </div>
        <div id="playlist-create-form" class="create-form glass" hidden>
          <input id="playlist-name-input" type="text" placeholder="Playlist name" maxlength="50">
          <button id="playlist-save-btn" class="btn btn-primary btn-sm">Create</button>
          <button id="playlist-cancel-btn" class="btn btn-ghost btn-sm">Cancel</button>
        </div>
        <div id="playlists-grid" class="playlists-grid">
          <p class="empty-state">No playlists yet</p>
        </div>
        <!-- Playlist detail modal -->
        <div id="playlist-detail" class="playlist-detail glass" hidden>
          <div class="detail-header">
            <button id="playlist-back-btn" class="btn btn-ghost btn-sm">← Back</button>
            <h3 id="playlist-detail-name"></h3>
            <div class="detail-actions">
              <button id="playlist-enqueue-btn" class="btn btn-primary btn-sm">▶ Play All</button>
              <button id="playlist-delete-btn" class="btn btn-danger btn-sm">🗑 Delete</button>
            </div>
          </div>
          <!-- Add song to playlist -->
          <div class="search-bar glass" style="margin-bottom:1rem">
            <span class="search-icon">➕</span>
            <input
              id="playlist-add-input"
              type="text"
              placeholder="Search or paste a URL — YouTube playlists also import in bulk…"
              autocomplete="off"
            >
            <button id="playlist-add-btn" class="btn btn-secondary btn-sm">+ Add</button>
          </div>
          <div id="playlist-tracks-list" class="playlist-tracks-list"></div>
        </div>
      </section>

      <!-- Upload View -->
      <section id="view-upload" class="view">
        <div class="view-header">
          <h2>Upload Music</h2>
        </div>
        <div class="upload-zone glass" id="upload-dropzone">
          <div class="upload-icon">📁</div>
          <p>Drag & drop audio files here</p>
          <p class="upload-hint">MP3, FLAC, WAV, OGG, M4A — Max 100MB</p>
          <input type="file" id="upload-input" accept=".mp3,.flac,.wav,.ogg,.m4a,.opus,.webm" hidden>
          <button id="upload-browse-btn" class="btn btn-secondary btn-sm">Browse Files</button>
        </div>
        <div id="upload-progress" class="upload-progress" hidden>
          <div class="progress-bar-container">
            <div id="upload-progress-bar" class="progress-bar-fill"></div>
          </div>
          <span id="upload-progress-text">Uploading...</span>
        </div>
        <div class="view-header" style="margin-top: 2rem">
          <h3>Uploaded Files</h3>
        </div>
        <div id="uploaded-files-list" class="uploaded-files-list">
          <p class="empty-state">No files uploaded yet</p>
        </div>
      </section>

      <!-- Settings View -->
      <section id="view-settings" class="view">
        <div class="view-header">
          <h2>Settings</h2>
        </div>
        <div class="settings-card glass">
          <div class="setting-row">
            <label for="setting-dj-role">DJ Role</label>
            <select id="setting-dj-role" class="setting-input">
              <option value="">None</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="setting-vote-threshold">Vote-Skip Threshold</label>
            <div class="setting-range">
              <input id="setting-vote-threshold" type="range" min="1" max="100" value="51" class="volume-slider">
              <span id="vote-threshold-label">51%</span>
            </div>
          </div>
          <div class="setting-row">
            <label for="setting-auto-leave">Auto-Leave Timeout (seconds)</label>
            <input id="setting-auto-leave" type="number" min="0" max="3600" value="300" class="setting-input">
          </div>
          <div class="setting-row">
            <label for="setting-default-volume">Default Volume</label>
            <div class="setting-range">
              <input id="setting-default-volume" type="range" min="1" max="100" value="80" class="volume-slider">
              <span id="default-volume-label">80%</span>
            </div>
          </div>
          <button id="settings-save-btn" class="btn btn-primary">Save Settings</button>
          <p id="settings-status" class="settings-status" hidden></p>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
